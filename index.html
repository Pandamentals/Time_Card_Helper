<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Timecard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" id="favicon" href="icon.png">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>
<title>Timecard Helper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: #2a2a2a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* ── MONITOR SHELL ── */
  .monitor {
    border-radius: 24px;
    padding: 28px 24px 44px;
    width: 100%;
    max-width: 520px;
    position: relative;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .monitor.theme-tan {
    background: linear-gradient(160deg, #e8e0c8 0%, #d9cfa8 40%, #cfc298 100%);
    box-shadow:
      0 0 0 1px #a89870,
      0 6px 40px rgba(0,0,0,0.7),
      inset 0 1px 0 #f0e8d0,
      inset 0 -2px 0 #b0a080,
      inset 2px 0 0 #ddd0b0,
      inset -2px 0 0 #b8a880;
  }
  .monitor.theme-dark {
    background: linear-gradient(160deg, #2a2a2a 0%, #1e1e1e 40%, #161616 100%);
    box-shadow:
      0 0 0 1px #111,
      0 6px 40px rgba(0,0,0,0.9),
      inset 0 1px 0 #3a3a3a,
      inset 0 -2px 0 #0a0a0a,
      inset 2px 0 0 #2a2a2a,
      inset -2px 0 0 #111;
  }

  /* vent slits */
  .monitor::after {
    content: '| | | | | | | | | | |';
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 2px;
    pointer-events: none;
    white-space: nowrap;
    transition: color 0.3s;
  }
  .monitor.theme-tan::after { color: #8a7a58; }
  .monitor.theme-dark::after { color: #333; }

  /* green power LED */
  .monitor::before {
    content: '';
    position: absolute;
    bottom: 16px;
    right: 44px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #33ff33;
    box-shadow: 0 0 6px #33ff33, 0 0 12px #33ff3366;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* red LED */
  .led-red {
    position: absolute;
    bottom: 16px;
    right: 28px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #cc1100;
    box-shadow: 0 0 5px #cc1100, 0 0 10px #cc110066;
  }

  /* ── THEME TOGGLE — LED indicator embedded in bezel top-left ── */
  .theme-toggle {
    position: absolute;
    top: 17px;
    left: 20px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    z-index: 20;
    padding: 0;
    transition: box-shadow 0.2s;
  }
  /* sunken socket the LED sits in */
  .theme-toggle::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    z-index: -1;
  }
  .monitor.theme-tan .theme-toggle::before {
    background: radial-gradient(circle, #a89060 0%, #c0aa70 100%);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.5),
      inset 0 -1px 0 rgba(255,255,255,0.15);
  }
  .monitor.theme-dark .theme-toggle::before {
    background: radial-gradient(circle, #111 0%, #1e1e1e 100%);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.8),
      inset 0 -1px 0 rgba(255,255,255,0.04);
  }
  /* the LED dot itself — amber when tan, green when dark */
  .monitor.theme-tan .theme-toggle {
    background: radial-gradient(circle at 35% 35%, #ffe090, #cc8800);
    box-shadow:
      0 0 4px #cc880088,
      0 0 8px #cc880044,
      inset 0 1px 0 rgba(255,255,200,0.4);
  }
  .monitor.theme-tan .theme-toggle:hover {
    box-shadow:
      0 0 6px #ffaa00cc,
      0 0 12px #cc880066,
      inset 0 1px 0 rgba(255,255,200,0.4);
  }
  .monitor.theme-dark .theme-toggle {
    background: radial-gradient(circle at 35% 35%, #66ff66, #00aa00);
    box-shadow:
      0 0 4px #33ff3399,
      0 0 8px #33ff3344,
      inset 0 1px 0 rgba(200,255,200,0.4);
  }
  .monitor.theme-dark .theme-toggle:hover {
    box-shadow:
      0 0 8px #33ff33cc,
      0 0 14px #33ff3366,
      inset 0 1px 0 rgba(200,255,200,0.4);
  }
  .theme-toggle:active { transform: scale(0.88); }

  /* ── SCREEN ── */
  .screen {
    background: #020e02;
    border-radius: 12px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.6),
      inset 0 0 20px rgba(51,255,51,0.04),
      0 0 20px rgba(51,255,51,0.08);
  }
  .screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
    border-radius: 12px 12px 60% 60% / 12px 12px 30px 30px;
    pointer-events: none;
    z-index: 10;
  }
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 10;
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.22) 3px, rgba(0,0,0,0.22) 4px
    );
    border-radius: 12px;
  }

  /* ── FLICKER ── */
  .flicker {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 6;
    animation: flicker 8s step-start infinite;
    border-radius: 12px;
  }
  @keyframes flicker {
    0%,100% { opacity: 0; }
    92% { opacity: 0; }
    93% { opacity: 0.03; }
    94% { opacity: 0; }
    97% { opacity: 0.02; }
    98% { opacity: 0; }
  }

  /* ── CONTENT ── */
  .content { position: relative; z-index: 2; color: #33ff33; }

  .header { border-bottom: 1px solid #33ff3344; padding-bottom: 10px; margin-bottom: 10px; }
  .sys-line { font-size: 10px; color: #1a8c1a; margin-bottom: 4px; letter-spacing: 1px; }
  h1 { font-family: 'VT323', monospace; font-size: 26px; color: #ffffff; letter-spacing: 3px; text-shadow: 0 0 10px #33ff3399; line-height: 1; }
  .subtitle { font-size: 10px; color: #1a8c1a; margin-top: 4px; letter-spacing: 0.5px; line-height: 1.8; }

  /* ── HOLIDAY BANNER ── */
  #holiday-banner {
    display: none;
    margin-bottom: 10px;
    border: 1px solid #33ff3344;
    border-left: 2px solid #33ff33;
    background: rgba(0,30,0,0.7);
    padding: 7px 11px;
  }
  #holiday-banner.active { display: block; }
  .banner-line {
    font-size: 10px;
    color: #33ff33;
    letter-spacing: 0.5px;
    line-height: 2.2;
  }
  .banner-line::before { content: '⚑ '; }

  /* ── DAY CARDS ── */
  .day-card {
    border: 1px solid #1a5c1a;
    border-left: 2px solid #33ff33;
    padding: 9px 11px;
    margin-bottom: 7px;
    background: rgba(0,20,0,0.5);
    transition: opacity 0.2s, border-left-color 0.2s;
  }
  .day-card.is-holiday {
    border-left-color: #1a5c1a;
    opacity: 0.65;
  }

  .day-top {
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-name { font-family: 'VT323', monospace; font-size: 19px; color: #33ff33; letter-spacing: 2px; text-shadow: 0 0 6px #33ff3388; }

  .hol-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 3px 7px;
    border: 1px solid #1a5c1a;
    background: #000;
    color: #1a5c1a;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .hol-btn:hover { border-color: #33ff3344; color: #33ff3366; }
  .hol-btn.active { background: #001200; border-color: #1a5c1a; color: #1a6c1a; box-shadow: 0 0 4px #33ff3311; }

  .holiday-display {
    display: none;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #1a6c1a;
    letter-spacing: 2px;
    padding: 7px 0 5px;
    text-align: center;
    border: 1px dashed #1a5c1a55;
    background: rgba(0,10,0,0.5);
    margin-bottom: 2px;
  }

  .times-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 9px; }
  .time-group { display: flex; flex-direction: column; gap: 3px; }
  .time-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; }

  input[type=time] {
    font-family: 'VT323', monospace;
    font-size: 19px;
    padding: 3px 6px;
    border: 1px solid #1a5c1a;
    width: 100%;
    background: #000;
    color: #33ff33;
    outline: none;
    letter-spacing: 1px;
    text-shadow: 0 0 4px #33ff3366;
  }
  input[type=time]:focus { border-color: #33ff33; box-shadow: 0 0 6px #33ff3344; }
  input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(3) hue-rotate(80deg); opacity: 0.35; }

  .bottom-row { display: flex; align-items: center; justify-content: space-between; }
  .lunch-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .lunch-btns { display: flex; gap: 4px; }
  .lunch-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 4px 8px;
    border: 1px solid #1a5c1a;
    background: #000;
    color: #1a8c1a;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .lunch-btn.active { background: #001a00; border-color: #33ff33; color: #33ff33; box-shadow: 0 0 5px #33ff3333; }
  .lunch-btn:hover  { border-color: #33ff3355; color: #33ff3377; }

  .hours-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .hours-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; }
  .pill { font-family: 'VT323', monospace; font-size: 19px; padding: 1px 9px; letter-spacing: 1px; border: 1px solid; }
  .pill-ok    { color: #ffffff; border-color: #ffffff55; text-shadow: 0 0 6px #fff; background: #001a00; }
  .pill-short { color: #ff4422; border-color: #ff442255; text-shadow: 0 0 6px #ff4422; background: #130000; }
  .pill-over  { color: #ff4422; border-color: #ff442255; text-shadow: 0 0 6px #ff4422; background: #130000; }
  .pill-none  { color: #1a5c1a; border-color: #0f2e0f; background: #000; }
  .pill-hol   { color: #1a6c1a; border-color: #1a5c1a44; background: #000; }

  .divider { border: none; border-top: 1px solid #1a5c1a; margin: 0.9rem 0; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 0.8rem; }
  .metric { background: rgba(0,20,0,0.5); border: 1px solid #1a5c1a; border-top: 2px solid #33ff33; padding: 8px 9px; }
  .metric-label { font-size: 9px; color: #1a8c1a; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .metric-value { font-family: 'VT323', monospace; font-size: 21px; color: #33ff33; text-shadow: 0 0 5px #33ff3366; letter-spacing: 1px; }
  .metric-value.good { color: #ffffff; text-shadow: 0 0 8px #ffffffaa; }
  .metric-value.bad  { color: #ff4422; text-shadow: 0 0 8px #ff442299; }
  .metric-sub { font-size: 9px; color: #1a8c1a; margin-top: 2px; letter-spacing: 0.5px; }

  .advice {
    font-size: 10px;
    padding: 9px 11px;
    border: 1px solid #1a5c1a;
    border-left: 2px solid #33ff33;
    background: rgba(0,20,0,0.5);
    line-height: 2;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .prompt { color: #33ff33; }
  .advice-text { color: #33ff33; }
  .advice-text.warn { color: #ff4422; }
  .advice-text.good { color: #ffffff; }

  /* ── RESET ── */
  .reset-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .reset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border: 1px solid #1a5c1a;
    background: #000;
    color: #1a5c1a;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #ff442244; color: #ff442255; }
  .reset-btn.confirming { border-color: #ff4422; color: #ff4422; box-shadow: 0 0 8px #ff442233; }

  .confirm-btns { display: none; gap: 6px; }
  .confirm-btns.visible { display: flex; }
  .confirm-yes, .confirm-no {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    border: 1px solid;
    background: #000;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .confirm-yes { border-color: #ff4422; color: #ff4422; }
  .confirm-yes:hover { background: #130000; }
  .confirm-no  { border-color: #1a5c1a; color: #1a8c1a; }
  .confirm-no:hover  { border-color: #33ff3344; color: #33ff3366; }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    body { padding: 3rem 2rem; align-items: center; }
    .monitor { max-width: 720px; padding: 34px 30px 52px; }
    h1 { font-size: 32px; }
    .sys-line, .subtitle { font-size: 11px; }
    .screen { padding: 24px 22px; }
    #rows {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 9px;
    }
    .day-card { margin-bottom: 0; }
    /* Mon=col1-2, Tue=col3-4, Wed=col1-2, Thu=col3-4, Fri=col2-3 (centered) */
    .day-card:nth-child(1) { grid-column: 1 / 3; }
    .day-card:nth-child(2) { grid-column: 3 / 5; }
    .day-card:nth-child(3) { grid-column: 1 / 3; }
    .day-card:nth-child(4) { grid-column: 3 / 5; }
    .day-card:nth-child(5) { grid-column: 2 / 4; }
    .day-name { font-size: 22px; }
    input[type=time] { font-size: 22px; }
    .pill { font-size: 22px; padding: 2px 12px; }
    .metric-value { font-size: 24px; }
    .banner-line { font-size: 11px; }
    .advice { font-size: 11px; }
    .reset-btn, .confirm-yes, .confirm-no { font-size: 11px; padding: 7px 16px; }
  }
</style>
</head>
<body>
<div class="monitor theme-tan" id="monitor">
  <div class="led-red"></div>
  <button class="theme-toggle" id="themeToggle" title="Toggle monitor skin"></button>
  <div class="screen">
    <div class="scanlines"></div>
    <div class="flicker"></div>
    <div class="content">

      <div class="header">
        <div class="sys-line">TIMESYS v3.0 // READY</div>
        <h1>TIMECARD HELPER</h1>
        <div class="subtitle">ROUNDS TO NEAREST 0.25H &nbsp;|&nbsp; LUNCH SUBTRACTED</div>
      </div>

      <div id="holiday-banner"></div>
      <div id="rows"></div>

      <hr class="divider">

      <div class="summary">
        <div class="metric">
          <div class="metric-label">This week</div>
          <div class="metric-value" id="total">–</div>
        </div>
        <div class="metric">
          <div class="metric-label">Target</div>
          <div class="metric-value" id="target-display">40H</div>
        </div>
        <div class="metric">
          <div class="metric-label">Diff</div>
          <div class="metric-value" id="diff">–</div>
          <div class="metric-sub" id="diff-sub"></div>
        </div>
      </div>

      <div class="advice" id="advice">
        <span class="prompt">&gt; </span><span class="advice-text">AWAITING INPUT_</span>
      </div>

      <div class="reset-wrap">
        <button class="reset-btn" id="resetBtn">[ RESET WEEK ]</button>
        <div class="confirm-btns" id="confirmBtns">
          <button class="confirm-yes" id="confirmYes">YES</button>
          <button class="confirm-no"  id="confirmNo">NO</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── CONFIG ──
const DAYS_CONFIG = [
  { name: 'MONDAY',    defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'TUESDAY',   defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'WEDNESDAY', defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'THURSDAY',  defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'FRIDAY',    defaultIn: '08:00', defaultOut: '15:30', defaultLunch: 30, baseTarget: 7.00 },
];
const LUNCH_OPTIONS  = [30, 45, 60];
const HOLIDAY_HOURS  = 8.0;
const STORAGE_KEY    = 'timecard_v3';
const THEME_KEY      = 'timecard_theme';

// temp store for times when a day goes holiday
const savedTimes = {};

// ── BUILD DOM ──
const container = document.getElementById('rows');

DAYS_CONFIG.forEach((day, i) => {
  const btns = LUNCH_OPTIONS.map(m => {
    const label  = m === 60 ? '1H' : `${m}M`;
    const active = m === day.defaultLunch ? ' active' : '';
    return `<button class="lunch-btn${active}" data-day="${i}" data-val="${m}">${label}</button>`;
  }).join('');

  const dc = document.createElement('div');
  dc.className = 'day-card';
  dc.id = `card-${i}`;
  dc.innerHTML = `
    <div class="day-top">
      <span class="day-name">${day.name}</span>
      <button class="hol-btn" data-day="${i}">[HOL]</button>
    </div>
    <div class="holiday-display" id="hol-display-${i}">▓ HOLIDAY — 8.00H ▓</div>
    <div class="times-row" id="times-${i}">
      <div class="time-group">
        <div class="time-label">Clock in</div>
        <input type="time" id="in-${i}" value="${day.defaultIn}">
      </div>
      <div class="time-group">
        <div class="time-label">Clock out</div>
        <input type="time" id="out-${i}" value="${day.defaultOut}">
      </div>
    </div>
    <div class="bottom-row" id="bottom-${i}">
      <div>
        <div class="lunch-label">Lunch</div>
        <div class="lunch-btns">${btns}</div>
      </div>
      <div class="hours-wrap">
        <div class="hours-label">Hours</div>
        <div id="pill-${i}" class="pill pill-none">–</div>
      </div>
    </div>
  `;
  container.appendChild(dc);
});

// ── HELPERS ──
function roundQ(min) {
  const r = min % 15;
  return r < 7.5 ? Math.floor(min / 15) * 15 : Math.ceil(min / 15) * 15;
}
function toMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function isHolidayDay(i) {
  return !!document.querySelector(`.hol-btn[data-day="${i}"]`)?.classList.contains('active');
}
function fridayIsHoliday() { return isHolidayDay(4); }

// per-day effective target (accounts for Friday holiday ripple on Mon–Thu)
function effectiveTarget(i) {
  if (isHolidayDay(i)) return HOLIDAY_HOURS;
  if (i < 4 && fridayIsHoliday()) return 8.00;
  return DAYS_CONFIG[i].baseTarget;
}

// dynamic weekly target
function weeklyTarget() {
  let t = 0;
  for (let i = 0; i < 5; i++) t += effectiveTarget(i);
  return t;
}

// ── HOLIDAY TOGGLE ──
container.addEventListener('click', e => {
  // holiday button
  const holBtn = e.target.closest('.hol-btn');
  if (holBtn) {
    const i = parseInt(holBtn.dataset.day, 10);
    const turningOn = !holBtn.classList.contains('active');

    if (turningOn) {
      savedTimes[i] = {
        inV:  document.getElementById(`in-${i}`).value,
        outV: document.getElementById(`out-${i}`).value,
      };
      document.getElementById(`times-${i}`).style.display  = 'none';
      document.getElementById(`bottom-${i}`).style.display = 'none';
      document.getElementById(`hol-display-${i}`).style.display = 'block';
      document.getElementById(`card-${i}`).classList.add('is-holiday');
      holBtn.classList.add('active');
    } else {
      if (savedTimes[i]) {
        document.getElementById(`in-${i}`).value  = savedTimes[i].inV;
        document.getElementById(`out-${i}`).value = savedTimes[i].outV;
        delete savedTimes[i];
      }
      document.getElementById(`times-${i}`).style.display  = '';
      document.getElementById(`bottom-${i}`).style.display = '';
      document.getElementById(`hol-display-${i}`).style.display = 'none';
      document.getElementById(`card-${i}`).classList.remove('is-holiday');
      holBtn.classList.remove('active');
    }
    saveState(); update(); return;
  }

  // lunch button
  const lunchBtn = e.target.closest('.lunch-btn');
  if (lunchBtn) {
    const d = lunchBtn.dataset.day;
    document.querySelectorAll(`.lunch-btn[data-day="${d}"]`).forEach(b => b.classList.remove('active'));
    lunchBtn.classList.add('active');
    saveState(); update();
  }
});

// ── MAIN UPDATE ──
function update() {
  const wTarget = weeklyTarget();
  // show target — if it changed from base 40h, show the actual number
  const base40 = Math.abs(wTarget - 40) < 0.01;
  document.getElementById('target-display').textContent = base40 ? '40H' : wTarget.toFixed(2) + 'H';

  let total = 0;

  DAYS_CONFIG.forEach((day, i) => {
    const pill    = document.getElementById(`pill-${i}`);
    const eTarget = effectiveTarget(i);

    if (isHolidayDay(i)) {
      total += HOLIDAY_HOURS;
      pill.textContent = '8.00H';
      pill.className   = 'pill pill-hol';
      return;
    }

    const inV  = document.getElementById(`in-${i}`).value;
    const outV = document.getElementById(`out-${i}`).value;
    if (!inV || !outV) { pill.textContent = '–'; pill.className = 'pill pill-none'; return; }

    const activeBtn = document.querySelector(`.lunch-btn.active[data-day="${i}"]`);
    const lunch  = activeBtn ? parseInt(activeBtn.dataset.val, 10) : day.defaultLunch;
    const worked = (roundQ(toMin(outV)) - roundQ(toMin(inV)) - lunch) / 60;
    total += worked;

    pill.textContent = worked.toFixed(2) + 'H';
    const delta = worked - eTarget;
    pill.className = 'pill ' + (Math.abs(delta) < 0.01 ? 'pill-ok' : delta < 0 ? 'pill-short' : 'pill-over');
  });

  const diff   = total - wTarget;
  const diffEl = document.getElementById('diff');
  const subEl  = document.getElementById('diff-sub');
  const advEl  = document.getElementById('advice');
  document.getElementById('total').textContent = total.toFixed(2) + 'H';

  if (Math.abs(diff) < 0.01) {
    diffEl.textContent = 'ON TARGET'; diffEl.className = 'metric-value good';
    subEl.textContent  = '';
    advEl.innerHTML    = '<span class="prompt">&gt; </span><span class="advice-text good">STATUS: TARGET REACHED. NOTHING TO MAKE UP.</span>';
  } else if (diff < 0) {
    const mins = Math.round(Math.abs(diff) * 60);
    diffEl.textContent = '-' + Math.abs(diff).toFixed(2) + 'H'; diffEl.className = 'metric-value bad';
    subEl.textContent  = mins + ' MIN SHORT';
    advEl.innerHTML    = `<span class="prompt">&gt; </span><span class="advice-text warn">MAKE UP ${mins} MIN (${Math.abs(diff).toFixed(2)}H). CLOCK IN EARLIER OR STAY LATER.</span>`;
  } else {
    const mins = Math.round(diff * 60);
    diffEl.textContent = '+' + diff.toFixed(2) + 'H'; diffEl.className = 'metric-value bad';
    subEl.textContent  = mins + ' MIN OVER';
    advEl.innerHTML    = `<span class="prompt">&gt; </span><span class="advice-text warn">WARNING: ${mins} MIN OVER TARGET. LEAVE EARLY TO COMPENSATE.</span>`;
  }

  updateBanner();
}

// ── HOLIDAY BANNER ──
function updateBanner() {
  const banner = document.getElementById('holiday-banner');
  const lines  = [];

  for (let i = 0; i < 4; i++) {
    if (isHolidayDay(i)) {
      lines.push(`${DAYS_CONFIG[i].name} HOLIDAY ACTIVE — WEEK IS 0.25H SHORT. MAKE UP TIME.`);
    }
  }
  if (fridayIsHoliday()) {
    lines.push('FRIDAY HOLIDAY ACTIVE — LEAVE AT 17:00 MON–THU');
  }

  if (lines.length === 0) {
    banner.innerHTML = '';
    banner.classList.remove('active');
  } else {
    banner.innerHTML = lines.map(l => `<div class="banner-line">${l}</div>`).join('');
    banner.classList.add('active');
  }
}

// ── LOCAL STORAGE ──
function saveState() {
  const state = {
    days: DAYS_CONFIG.map((_, i) => ({
      inV:      document.getElementById(`in-${i}`).value,
      outV:     document.getElementById(`out-${i}`).value,
      lunch:    parseInt(document.querySelector(`.lunch-btn.active[data-day="${i}"]`)?.dataset.val || DAYS_CONFIG[i].defaultLunch, 10),
      holiday:  isHolidayDay(i),
      savedIn:  savedTimes[i]?.inV  || null,
      savedOut: savedTimes[i]?.outV || null,
    }))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);
    state.days.forEach((d, i) => {
      document.getElementById(`in-${i}`).value  = d.inV  || DAYS_CONFIG[i].defaultIn;
      document.getElementById(`out-${i}`).value = d.outV || DAYS_CONFIG[i].defaultOut;

      document.querySelectorAll(`.lunch-btn[data-day="${i}"]`).forEach(b => b.classList.remove('active'));
      const lb = document.querySelector(`.lunch-btn[data-day="${i}"][data-val="${d.lunch}"]`);
      if (lb) lb.classList.add('active');

      if (d.holiday) {
        if (d.savedIn !== null) savedTimes[i] = { inV: d.savedIn, outV: d.savedOut };
        const hb = document.querySelector(`.hol-btn[data-day="${i}"]`);
        hb.classList.add('active');
        document.getElementById(`times-${i}`).style.display       = 'none';
        document.getElementById(`bottom-${i}`).style.display      = 'none';
        document.getElementById(`hol-display-${i}`).style.display = 'block';
        document.getElementById(`card-${i}`).classList.add('is-holiday');
      }
    });
  } catch(e) { console.warn('State load failed', e); }
}

// ── RESET ──
let resetTimer = null;
const resetBtn    = document.getElementById('resetBtn');
const confirmBtns = document.getElementById('confirmBtns');
const confirmYes  = document.getElementById('confirmYes');
const confirmNo   = document.getElementById('confirmNo');

function cancelReset() {
  clearTimeout(resetTimer);
  resetBtn.textContent = '[ RESET WEEK ]';
  resetBtn.classList.remove('confirming');
  confirmBtns.classList.remove('visible');
}

resetBtn.addEventListener('click', () => {
  resetBtn.textContent = 'CONFIRM RESET?';
  resetBtn.classList.add('confirming');
  confirmBtns.classList.add('visible');
  resetTimer = setTimeout(cancelReset, 5000);
});
confirmNo.addEventListener('click', cancelReset);
confirmYes.addEventListener('click', () => {
  cancelReset();
  localStorage.removeItem(STORAGE_KEY);
  Object.keys(savedTimes).forEach(k => delete savedTimes[k]);

  DAYS_CONFIG.forEach((day, i) => {
    document.getElementById(`in-${i}`).value  = day.defaultIn;
    document.getElementById(`out-${i}`).value = day.defaultOut;
    document.querySelectorAll(`.lunch-btn[data-day="${i}"]`).forEach(b => b.classList.remove('active'));
    const def = document.querySelector(`.lunch-btn[data-day="${i}"][data-val="${day.defaultLunch}"]`);
    if (def) def.classList.add('active');
    const hb = document.querySelector(`.hol-btn[data-day="${i}"]`);
    hb.classList.remove('active');
    document.getElementById(`times-${i}`).style.display       = '';
    document.getElementById(`bottom-${i}`).style.display      = '';
    document.getElementById(`hol-display-${i}`).style.display = 'none';
    document.getElementById(`card-${i}`).classList.remove('is-holiday');
  });
  update();
});

// ── THEME TOGGLE ──
const monitor        = document.getElementById('monitor');
const themeToggle    = document.getElementById('themeToggle');
const favicon        = document.getElementById('favicon');
const appleTouchIcon = document.getElementById('apple-touch-icon');

function applyTheme(theme) {
  monitor.classList.remove('theme-tan', 'theme-dark');
  monitor.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-tan');
  const iconFile = theme === 'dark' ? 'icon-180.png' : 'icon.png';
  favicon.href        = iconFile;
  appleTouchIcon.href = iconFile;
  localStorage.setItem(THEME_KEY, theme);
}

themeToggle.addEventListener('click', () => {
  applyTheme(monitor.classList.contains('theme-dark') ? 'tan' : 'dark');
});

// ── INIT ──
applyTheme(localStorage.getItem(THEME_KEY) || 'tan');
loadState();
document.querySelectorAll('input[type=time]').forEach(el =>
  el.addEventListener('change', () => { saveState(); update(); })
);
update();
</script>
</body>
