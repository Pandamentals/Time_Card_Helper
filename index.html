<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Timecard">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="icons/tan-apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/tan-favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/tan-favicon-16x16.png">
<link rel="shortcut icon" href="icons/tan-favicon.ico">
<meta name="msapplication-TileColor" content="#1a1a1a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>
<title>Timecard Helper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background:
      radial-gradient(circle at 50% 10%, rgba(51,255,51,0.08), transparent 26rem),
      radial-gradient(circle at 20% 80%, rgba(255,170,0,0.08), transparent 18rem),
      linear-gradient(145deg, #32302a 0%, #1c1d1a 52%, #0d120d 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* ── MONITOR SHELL ── */
  .monitor {
    border-radius: 24px;
    padding: 28px 24px 44px;
    width: 100%;
    max-width: 520px;
    position: relative;
    transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
    isolation: isolate;
  }
  .monitor.theme-tan {
    background: linear-gradient(160deg, #e8e0c8 0%, #d9cfa8 40%, #cfc298 100%);
    box-shadow:
      0 0 0 1px #a89870,
      0 6px 40px rgba(0,0,0,0.7),
      inset 0 1px 0 #f0e8d0,
      inset 0 -2px 0 #b0a080,
      inset 2px 0 0 #ddd0b0,
      inset -2px 0 0 #b8a880;
  }
  .monitor.theme-dark {
    background: linear-gradient(160deg, #2a2a2a 0%, #1e1e1e 40%, #161616 100%);
    box-shadow:
      0 0 0 1px #111,
      0 6px 40px rgba(0,0,0,0.9),
      inset 0 1px 0 #3a3a3a,
      inset 0 -2px 0 #0a0a0a,
      inset 2px 0 0 #2a2a2a,
      inset -2px 0 0 #111;
  }

  .monitor:hover { transform: translateY(-2px); }

  /* vent slits */
  .monitor::after {
    content: '| | | | | | | | | | |';
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 2px;
    pointer-events: none;
    white-space: nowrap;
    transition: color 0.3s;
  }
  .monitor.theme-tan::after { color: #8a7a58; }
  .monitor.theme-dark::after { color: #333; }

  /* green power LED */
  .monitor::before {
    content: '';
    position: absolute;
    bottom: 16px;
    right: 44px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #33ff33;
    box-shadow: 0 0 6px #33ff33, 0 0 12px #33ff3366;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* red LED */
  .led-red {
    position: absolute;
    bottom: 16px;
    right: 28px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #cc1100;
    box-shadow: 0 0 5px #cc1100, 0 0 10px #cc110066;
  }

  /* ── THEME TOGGLE — LED indicator embedded in bezel top-left ── */
  .theme-toggle {
    position: absolute;
    top: 17px;
    left: 20px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    z-index: 20;
    padding: 0;
    transition: box-shadow 0.2s;
  }
  /* sunken socket the LED sits in */
  .theme-toggle::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    z-index: -1;
  }
  .monitor.theme-tan .theme-toggle::before {
    background: radial-gradient(circle, #a89060 0%, #c0aa70 100%);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.5),
      inset 0 -1px 0 rgba(255,255,255,0.15);
  }
  .monitor.theme-dark .theme-toggle::before {
    background: radial-gradient(circle, #111 0%, #1e1e1e 100%);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.8),
      inset 0 -1px 0 rgba(255,255,255,0.04);
  }
  /* the LED dot itself — amber when tan, green when dark */
  .monitor.theme-tan .theme-toggle {
    background: radial-gradient(circle at 35% 35%, #ffe090, #cc8800);
    box-shadow:
      0 0 4px #cc880088,
      0 0 8px #cc880044,
      inset 0 1px 0 rgba(255,255,200,0.4);
  }
  .monitor.theme-tan .theme-toggle:hover {
    box-shadow:
      0 0 6px #ffaa00cc,
      0 0 12px #cc880066,
      inset 0 1px 0 rgba(255,255,200,0.4);
  }
  .monitor.theme-dark .theme-toggle {
    background: radial-gradient(circle at 35% 35%, #66ff66, #00aa00);
    box-shadow:
      0 0 4px #33ff3399,
      0 0 8px #33ff3344,
      inset 0 1px 0 rgba(200,255,200,0.4);
  }
  .monitor.theme-dark .theme-toggle:hover {
    box-shadow:
      0 0 8px #33ff33cc,
      0 0 14px #33ff3366,
      inset 0 1px 0 rgba(200,255,200,0.4);
  }
  .theme-toggle:active { transform: scale(0.88); }

  /* ── SCREEN ── */
  .screen {
    background: #020e02;
    border-radius: 12px;
    padding: 20px 18px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.6),
      inset 0 0 20px rgba(51,255,51,0.04),
      0 0 20px rgba(51,255,51,0.08);
    animation: screen-hum 5.5s ease-in-out infinite;
  }
  .screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, transparent 100%);
    border-radius: 12px 12px 60% 60% / 12px 12px 30px 30px;
    pointer-events: none;
    z-index: 10;
  }
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.7),
      inset 0 0 120px rgba(0,0,0,0.58);
    pointer-events: none;
    z-index: 10;
  }

  @keyframes screen-hum {
    0%,100% { box-shadow: inset 0 0 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(51,255,51,0.04), 0 0 20px rgba(51,255,51,0.08); }
    50% { box-shadow: inset 0 0 70px rgba(0,0,0,0.64), inset 0 0 30px rgba(51,255,51,0.08), 0 0 26px rgba(51,255,51,0.12); }
  }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.22) 3px, rgba(0,0,0,0.22) 4px
    );
    border-radius: 12px;
    animation: scanline-roll 9s linear infinite;
  }

  @keyframes scanline-roll {
    from { background-position: 0 0; }
    to { background-position: 0 64px; }
  }

  /* ── FLICKER ── */
  .flicker {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 6;
    background: rgba(51,255,51,0.04);
    mix-blend-mode: screen;
    animation: flicker 8s step-start infinite;
    border-radius: 12px;
  }
  @keyframes flicker {
    0%,100% { opacity: 0; }
    92% { opacity: 0; }
    93% { opacity: 0.03; }
    94% { opacity: 0; }
    97% { opacity: 0.02; }
    98% { opacity: 0; }
  }

  .screen-noise,
  .screen-distortion {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    pointer-events: none;
  }
  .screen-noise {
    z-index: 7;
    opacity: 0.12;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.35) 0 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(51,255,51,0.25) 0 1px, transparent 1px);
    background-size: 13px 11px, 17px 19px;
    animation: noise-shift 0.35s steps(2) infinite;
  }
  .screen-distortion {
    z-index: 8;
    opacity: 0.32;
    background:
      linear-gradient(90deg, transparent 0%, rgba(255,68,34,0.09) 12%, transparent 22%),
      linear-gradient(270deg, transparent 0%, rgba(51,255,51,0.08) 18%, transparent 28%);
    filter: blur(0.6px);
    transform: translateX(-100%);
    animation: distortion-pass 6.5s cubic-bezier(0.5,0,0.2,1) infinite;
  }
  @keyframes noise-shift {
    0% { transform: translate3d(0,0,0); }
    100% { transform: translate3d(-2px,1px,0); }
  }
  @keyframes distortion-pass {
    0%, 70%, 100% { transform: translateX(-120%) skewX(0deg); opacity: 0; }
    72% { opacity: 0.12; }
    78% { transform: translateX(15%) skewX(-7deg); opacity: 0.36; }
    84% { transform: translateX(120%) skewX(3deg); opacity: 0; }
  }

  /* ── CONTENT ── */
  .content {
    position: relative;
    z-index: 2;
    color: #33ff33;
    text-shadow: 0 0 4px rgba(51,255,51,0.35);
    animation: phosphor-drift 7s ease-in-out infinite;
  }

  @keyframes phosphor-drift {
    0%,100% { transform: translateX(0); }
    48% { transform: translateX(0); }
    50% { transform: translateX(0.35px); }
    52% { transform: translateX(-0.25px); }
    54% { transform: translateX(0); }
  }

  .header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #33ff3344;
    padding-bottom: 8px;
    margin-bottom: 10px;
  }
  .header-copy { min-width: 0; }
  .sys-line { font-size: 10px; color: #1a8c1a; margin-bottom: 4px; letter-spacing: 1px; }
  h1 { font-family: 'VT323', monospace; font-size: 26px; color: #ffffff; letter-spacing: 3px; text-shadow: 0 0 10px #33ff3399; line-height: 1; }
  .subtitle { font-size: 10px; color: #1a8c1a; margin-top: 4px; letter-spacing: 0.5px; line-height: 1.8; }

  .mascot-panel {
    --mascot-glow: #33ff33;
    --mascot-dim: #1a8c1a;
    --mascot-core: #dfff33;
    --mascot-shade: #061406;
    --tic-size: 58px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    width: 76px;
    margin: -2px 0 -2px;
    padding: 0;
    border: none;
    background: transparent;
    box-shadow: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .time-mascot {
    width: var(--tic-size);
    height: var(--tic-size);
    display: block;
    overflow: visible;
    color: var(--mascot-glow);
    filter:
      drop-shadow(0 0 4px color-mix(in srgb, var(--mascot-glow) 70%, transparent))
      drop-shadow(0 0 11px color-mix(in srgb, var(--mascot-glow) 30%, transparent));
    animation:
      mascot-idle 2.8s ease-in-out infinite,
      mascot-breathe 3.4s ease-in-out infinite;
    transition: color 0.35s, filter 0.35s;
  }
  .mascot-line,
  .mascot-fill,
  .mascot-face,
  .mascot-detail {
    stroke: currentColor;
    transition: stroke 0.35s, fill 0.35s, opacity 0.25s, transform 0.25s;
  }
  .mascot-line {
    fill: var(--mascot-shade);
    stroke-width: 4.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .mascot-fill { fill: var(--mascot-core); stroke-width: 2; }
  .mascot-face {
    fill: none;
    stroke-width: 4.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .mascot-detail {
    fill: none;
    stroke-width: 2.1;
    stroke-linecap: round;
    opacity: 0.68;
  }
  .mascot-black { fill: #020e02; stroke: none; }
  .mascot-grain { fill: currentColor; opacity: 0.38; transform-box: fill-box; transform-origin: center; }
  .mascot-rim { fill: none; stroke-width: 3; opacity: 0.85; }
  .mascot-eye { transform-origin: center; }
  .mascot-mouth {
    opacity: 0;
    stroke-width: 4.1;
    transform-box: fill-box;
    transform-origin: center;
  }
  .mascot-brow {
    fill: var(--mascot-core);
    stroke: none;
    opacity: 0.9;
    transform-box: fill-box;
    transform-origin: center;
  }
  .mascot-hand,
  .mascot-foot,
  .mascot-leg,
  .mascot-arm,
  .mascot-bell { transform-box: fill-box; transform-origin: center; }
  .mascot-status-good {
    --mascot-glow: #bfff24;
    --mascot-dim: #8fb81f;
    --mascot-core: #dfff33;
  }
  .mascot-status-worried {
    --mascot-glow: #ffe033;
    --mascot-dim: #b89420;
    --mascot-core: #ffe85a;
  }
  .mascot-status-stressed {
    --mascot-glow: #ff8a22;
    --mascot-dim: #c05718;
    --mascot-core: #ff9e38;
  }
  .mascot-status-meltdown {
    --mascot-glow: #ff3322;
    --mascot-dim: #b51f18;
    --mascot-core: #ff513d;
  }
  .mascot-status-good .mouth-happy,
  .mascot-status-worried .mouth-worried,
  .mascot-status-stressed .mouth-stressed,
  .mascot-status-meltdown .mouth-meltdown { opacity: 1; }
  .mascot-status-good .mascot-eye { transform: translateY(1px) scaleX(1.04); }
  .mascot-status-worried .mascot-eye { transform: translateY(-0.5px) scaleY(1.08); }
  .mascot-status-stressed .mascot-eye { transform: translateY(-1px) scaleX(0.84) scaleY(1.18); }
  .mascot-status-meltdown .mascot-eye { transform: translateY(-1.5px) scaleX(0.72) scaleY(1.28); }
  .mascot-status-good .brow-left { transform: translate(-1px,1px) rotate(-5deg); }
  .mascot-status-good .brow-right { transform: translate(1px,1px) rotate(5deg); }
  .mascot-status-worried .brow-left { transform: translate(1px,2px) rotate(-8deg); }
  .mascot-status-worried .brow-right { transform: translate(-1px,2px) rotate(8deg); }
  .mascot-status-stressed .brow-left { transform: translate(2px,3px) rotate(-13deg); }
  .mascot-status-stressed .brow-right { transform: translate(-2px,3px) rotate(13deg); }
  .mascot-status-meltdown .brow-left { transform: translate(3px,4px) rotate(-18deg); }
  .mascot-status-meltdown .brow-right { transform: translate(-3px,4px) rotate(18deg); }
  .mascot-status-worried .time-mascot {
    animation:
      mascot-worry 1.9s ease-in-out infinite,
      mascot-breathe 3.4s ease-in-out infinite;
  }
  .mascot-status-stressed .time-mascot {
    animation:
      mascot-stress 0.5s steps(2) infinite,
      mascot-breathe 3.4s ease-in-out infinite;
  }
  .mascot-status-meltdown .time-mascot {
    animation:
      mascot-meltdown 0.22s steps(2) infinite,
      mascot-breathe 3.4s ease-in-out infinite;
  }
  .mascot-status-worried .mascot-hand { animation: hand-worry 1.4s ease-in-out infinite; }
  .mascot-status-stressed .mascot-hand,
  .mascot-status-meltdown .mascot-hand { animation: hand-tremble 0.32s steps(2) infinite; }
  .mascot-status-stressed .mascot-grain,
  .mascot-status-meltdown .mascot-grain { animation: grain-fizz 0.45s steps(2) infinite; }
  .mascot-status-meltdown .mascot-bell { animation: bell-rattle 0.18s steps(2) infinite; }
  .mascot-copy {
    width: 100%;
    min-width: 0;
    font-size: 8px;
    line-height: 1.25;
    color: var(--mascot-dim);
    letter-spacing: 0.5px;
    text-align: center;
    transition: color 0.35s;
  }
  #mascotLineB { display: none; }
  @keyframes mascot-idle {
    0%,100% { transform: translateY(0) rotate(-0.5deg); }
    50% { transform: translateY(-3px) rotate(0.5deg); }
  }
  @keyframes mascot-breathe {
    0%,100% {
      filter:
        drop-shadow(0 0 3px color-mix(in srgb, var(--mascot-glow) 52%, transparent))
        drop-shadow(0 0 8px color-mix(in srgb, var(--mascot-glow) 22%, transparent));
    }
    50% {
      filter:
        drop-shadow(0 0 5px color-mix(in srgb, var(--mascot-glow) 70%, transparent))
        drop-shadow(0 0 13px color-mix(in srgb, var(--mascot-glow) 34%, transparent));
    }
  }
  @keyframes mascot-worry {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50% { transform: translateY(-2px) rotate(1.5deg); }
  }
  @keyframes mascot-stress {
    0%,100% { transform: translate(0,0) rotate(-1deg); }
    50% { transform: translate(1px,-1px) rotate(1deg); }
  }
  @keyframes mascot-meltdown {
    0%,100% { transform: translate(-1px,0) rotate(-2deg) scaleY(1); }
    50% { transform: translate(1px,1px) rotate(2deg) scaleY(0.98); }
  }
  @keyframes hand-worry {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(2px) rotate(-5deg); }
  }
  @keyframes hand-tremble {
    0%,100% { transform: translateX(0) rotate(0deg); }
    50% { transform: translateX(2px) rotate(5deg); }
  }
  @keyframes bell-rattle {
    0%,100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }
  @keyframes grain-fizz {
    0%,100% { opacity: 0.22; transform: translate(0,0); }
    50% { opacity: 0.48; transform: translate(1px,-1px); }
  }

  /* ── HOLIDAY BANNER ── */
  #holiday-banner {
    display: none;
    margin-bottom: 10px;
    border: 1px solid #33ff3344;
    border-left: 2px solid #33ff33;
    background: rgba(0,30,0,0.7);
    padding: 7px 11px;
  }
  #holiday-banner.active { display: block; }
  .banner-line {
    font-size: 10px;
    color: #33ff33;
    letter-spacing: 0.5px;
    line-height: 2.2;
  }
  .banner-line::before { content: '⚑ '; }

  /* ── DAY CARDS ── */
  .day-card {
    border: 1px solid #164416;
    border-left: 2px solid #249724;
    padding: 9px 11px;
    margin-bottom: 7px;
    background: rgba(0,18,0,0.42);
    transition: opacity 0.2s, border-left-color 0.2s;
  }
  .day-card.is-holiday {
    border-left-color: #1a5c1a;
    opacity: 0.65;
  }

  .day-top {
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-name { font-family: 'VT323', monospace; font-size: 19px; color: #33ff33; letter-spacing: 2px; text-shadow: 0 0 4px #33ff3355; }

  .day-btns { display: flex; gap: 4px; }

  .hol-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 3px 7px;
    border: 1px solid #1a5c1a;
    background: #000;
    color: #1a5c1a;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .hol-btn:hover { border-color: #33ff3344; color: #33ff3366; }
  .hol-btn.active { background: #001200; border-color: #1a5c1a; color: #1a6c1a; box-shadow: 0 0 4px #33ff3311; }

  .holiday-display {
    display: none;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #1a6c1a;
    letter-spacing: 2px;
    padding: 7px 0 5px;
    text-align: center;
    border: 1px dashed #1a5c1a55;
    background: rgba(0,10,0,0.5);
    margin-bottom: 2px;
  }

  .times-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 9px; }
  .time-group { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .time-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; }

  input[type=time] {
    font-family: 'VT323', monospace;
    font-size: 19px;
    padding: 3px 6px;
    border: 1px solid #1a5c1a;
    width: 100%;
    min-width: 0;
    overflow: hidden;
    background: #000;
    color: #33ff33;
    outline: none;
    letter-spacing: 1px;
    text-shadow: 0 0 4px #33ff3366;
  }
  input[type=time]:focus { border-color: #33ff33; box-shadow: 0 0 6px #33ff3344; }
  input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(3) hue-rotate(80deg); opacity: 0.35; }

  /* shrink clock icon on mobile so AM/PM stays visible — applies to real mobile AND sim toggle */
  @media (max-width: 767px) {
    input[type=time]::-webkit-calendar-picker-indicator {
      width: 12px;
      height: 12px;
      padding: 0;
      margin-left: 2px;
    }
  }

  .bottom-row { display: flex; align-items: center; justify-content: space-between; }
  .lunch-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .lunch-btns { display: flex; gap: 4px; }
  .lunch-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; padding: 4px 8px;
    border: 1px solid #1a5c1a;
    background: #000;
    color: #1a8c1a;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .lunch-btn.active { background: #001a00; border-color: #249724; color: #33ff33; box-shadow: 0 0 3px #33ff331f; }
  .lunch-btn:hover  { border-color: #33ff3355; color: #33ff3377; }

  .hours-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .hours-label { font-size: 9px; color: #1a8c1a; letter-spacing: 1px; text-transform: uppercase; }
  .pill { font-family: 'VT323', monospace; font-size: 19px; padding: 1px 9px; letter-spacing: 1px; border: 1px solid; }
  .pill-ok    { color: #ffffff; border-color: #ffffff55; text-shadow: 0 0 6px #fff; background: #001a00; }
  .pill-short { color: #ff4422; border-color: #ff442255; text-shadow: 0 0 6px #ff4422; background: #130000; }
  .pill-over  { color: #ff4422; border-color: #ff442255; text-shadow: 0 0 6px #ff4422; background: #130000; }
  .pill-none  { color: #1a5c1a; border-color: #0f2e0f; background: #000; }
  .pill-hol   { color: #1a6c1a; border-color: #1a5c1a44; background: #000; }
  .pill-pto   { color: #cc9900; border-color: #cc990055; text-shadow: 0 0 5px #cc990088; background: #0a0800; }

  .pto-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 3px 7px;
    border: 1px solid #664400;
    background: #000;
    color: #664400;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .pto-btn:hover { border-color: #cc990044; color: #cc990066; }
  .pto-btn.active { background: #0a0800; border-color: #886600; color: #cc9900; box-shadow: 0 0 4px #cc990022; }

  .pto-display {
    display: none;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #886600;
    letter-spacing: 2px;
    padding: 7px 0 5px;
    text-align: center;
    border: 1px dashed #66440055;
    background: rgba(10,8,0,0.5);
    margin-bottom: 2px;
  }

  .day-card.is-pto {
    border-left-color: #886600;
    opacity: 0.65;
  }

  .divider { border: none; border-top: 1px solid #1a5c1a; margin: 0.9rem 0; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 0.8rem; }
  .metric { background: rgba(0,18,0,0.42); border: 1px solid #164416; border-top: 2px solid #249724; padding: 8px 9px; }
  .metric-label { font-size: 9px; color: #1a8c1a; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
  .metric-value { font-family: 'VT323', monospace; font-size: 21px; color: #33ff33; text-shadow: 0 0 5px #33ff3366; letter-spacing: 1px; }
  .metric-value.good { color: #ffffff; text-shadow: 0 0 8px #ffffffaa; }
  .metric-value.bad  { color: #ff4422; text-shadow: 0 0 8px #ff442299; }
  .metric-sub { font-size: 9px; color: #1a8c1a; margin-top: 2px; letter-spacing: 0.5px; }

  .advice {
    font-size: 10px;
    padding: 9px 11px;
    border: 1px solid #1a5c1a;
    border-left: 2px solid #33ff33;
    background: rgba(0,20,0,0.5);
    line-height: 2;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .prompt { color: #33ff33; }
  .advice-text { color: #33ff33; }
  .advice-text.warn { color: #ff4422; }
  .advice-text.good { color: #ffffff; }

  /* ── RESET ── */
  .reset-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .reset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 14px;
    border: 1px solid #ff4422;
    background: #000;
    color: #ff4422;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    box-shadow: 0 0 6px #ff442244, 0 0 12px #ff442211;
  }
  .reset-btn:hover { box-shadow: 0 0 10px #ff442266, 0 0 20px #ff442222; }
  @keyframes red-pulse {
    0%,100% { box-shadow: 0 0 8px #ff442266, 0 0 16px #ff442233; }
    50%      { box-shadow: 0 0 16px #ff4422cc, 0 0 32px #ff442266, inset 0 0 8px #ff442122; }
  }
  .reset-btn.confirming {
    border-color: #ff4422;
    color: #ff4422;
    animation: red-pulse 1.2s ease-in-out infinite;
  }

  .confirm-btns { display: none; gap: 6px; }
  .confirm-btns.visible { display: flex; }
  @keyframes green-pulse {
    0%,100% { box-shadow: 0 0 6px #33ff3355, 0 0 12px #33ff3322; }
    50%      { box-shadow: 0 0 12px #33ff33aa, 0 0 24px #33ff3355; }
  }
  .confirm-yes, .confirm-no {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    border: 1px solid;
    background: #000;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.15s;
  }
  .confirm-yes { border-color: #ff4422; color: #ff4422; animation: red-pulse 1.2s ease-in-out infinite; }
  .confirm-yes:hover { background: #130000; }
  .confirm-no  { border-color: #33ff33; color: #33ff33; animation: green-pulse 1.2s ease-in-out infinite; }
  .confirm-no:hover  { background: #001a00; }

  /* ── BOOT SCREEN ── */
  #boot-overlay {
    position: absolute;
    inset: 0;
    background: #020e02;
    border-radius: 12px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 20px 18px;
    overflow: hidden;
  }
  #boot-overlay.hidden { display: none; }
  #boot-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.22) 3px, rgba(0,0,0,0.22) 4px
    );
    border-radius: 12px;
    pointer-events: none;
    z-index: 5;
  }
  #boot-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 4;
    opacity: 0;
    background:
      radial-gradient(ellipse at center, rgba(255,255,255,0.92) 0%, rgba(51,255,51,0.62) 7%, rgba(51,255,51,0.12) 20%, transparent 44%),
      linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    transform: scaleY(0.035);
    animation: boot-tube-flash 0.68s cubic-bezier(0.2,0,0.1,1) forwards;
  }
  @keyframes boot-tube-flash {
    0% { opacity: 0; transform: scaleY(0.01) scaleX(0.2); filter: brightness(2); }
    18% { opacity: 1; transform: scaleY(0.025) scaleX(1); filter: brightness(4); }
    42% { opacity: 0.65; transform: scaleY(1.08) scaleX(1); filter: brightness(1.8); }
    100% { opacity: 0; transform: scaleY(1.08) scaleX(1); filter: brightness(1); }
  }
  .boot-lines { position: relative; z-index: 6; }
  .boot-line {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #1a8c1a;
    letter-spacing: 0.5px;
    line-height: 2.2;
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
  }
  .boot-line.visible { opacity: 1; }
  .boot-line .ok   { color: #33ff33; text-shadow: 0 0 6px #33ff3366; }
  .boot-line-title {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #ffffff;
    letter-spacing: 3px;
    text-shadow: 0 0 10px #33ff3399;
    opacity: 0;
    margin-top: 6px;
    line-height: 1.3;
  }
  .boot-line-title.visible { opacity: 1; }
  .boot-cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: #33ff33;
    box-shadow: 0 0 6px #33ff33;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink-cursor 0.7s step-start infinite;
  }
  @keyframes blink-cursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes power-flash {
    0%  { opacity: 0; filter: brightness(5) contrast(0.5); }
    15% { opacity: 0.9; }
    30% { opacity: 0.12; transform: translateX(1px) skewX(1deg); }
    50% { opacity: 0.85; transform: translateX(-1px) skewX(-1deg); }
    70% { opacity: 0.35; }
    100% { opacity: 1; filter: brightness(1) contrast(1); transform: none; }
  }
  #boot-overlay.powering-on { animation: power-flash 0.25s ease-out forwards; }
  @keyframes crt-collapse {
    0%   { transform: scaleY(1);    filter: brightness(1); }
    70%  { transform: scaleY(0.06); filter: brightness(2.5); }
    100% { transform: scaleY(0.02); filter: brightness(4); }
  }
  #boot-overlay.booting-out {
    transform-origin: center center;
    animation: crt-collapse 0.28s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes screen-bloom {
    0%   { filter: brightness(1)  saturate(1);   }
    20%  { filter: brightness(4)  saturate(0.3); }
    45%  { filter: brightness(6)  saturate(0.1); }
    100% { filter: brightness(1)  saturate(1);   }
  }
  .screen.blooming { animation: screen-bloom 0.9s ease-out forwards; }

  .content.boot-hidden { opacity: 0; }
  @keyframes content-fadein {
    0%   { opacity: 0; filter: brightness(2) saturate(0.3); }
    100% { opacity: 1; filter: brightness(1) saturate(1);   }
  }
  .content.boot-reveal { animation: content-fadein 0.35s ease-out forwards; }

  /* ── BOOT SCANLINE BEAM ── */
  #boot-scanline {
    position: absolute;
    left: -2px; right: -2px;
    height: 32px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    top: -32px;
    background: linear-gradient(
      180deg,
      transparent              0%,
      rgba(51,255,51,0.06)     12%,
      rgba(51,255,51,0.18)     35%,
      rgba(180,255,180,0.65)   50%,
      rgba(51,255,51,0.18)     65%,
      rgba(51,255,51,0.06)     88%,
      transparent              100%
    );
    box-shadow: 0 0 10px 3px rgba(51,255,51,0.35), 0 0 28px 6px rgba(51,255,51,0.15);
    filter: blur(0.3px);
  }
  #boot-scanline.sweeping { opacity: 1; }

  /* ── DESKTOP ── */
  @media (min-width: 768px) {
    body { padding: 3rem 2rem; align-items: center; }
    .monitor { max-width: 720px; padding: 34px 30px 52px; }
    h1 { font-size: 32px; }
    .sys-line, .subtitle { font-size: 11px; }
    .screen { padding: 24px 22px; }
    #rows {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 9px;
    }
    .day-card { margin-bottom: 0; }
    /* Mon=col1-2, Tue=col3-4, Wed=col1-2, Thu=col3-4, Fri=col2-3 (centered) */
    .day-card:nth-child(1) { grid-column: 1 / 3; }
    .day-card:nth-child(2) { grid-column: 3 / 5; }
    .day-card:nth-child(3) { grid-column: 1 / 3; }
    .day-card:nth-child(4) { grid-column: 3 / 5; }
    .day-card:nth-child(5) { grid-column: 2 / 4; }
    .day-name { font-size: 22px; }
    input[type=time] { font-size: 22px; }
    .pill { font-size: 22px; padding: 2px 12px; }
    .metric-value { font-size: 24px; }
    .banner-line { font-size: 11px; }
    .advice { font-size: 11px; }
    .reset-btn, .confirm-yes, .confirm-no { font-size: 11px; padding: 7px 16px; }
  }

  @media (max-width: 430px) {
    body { padding: 1rem 0.5rem; }
    .monitor { padding: 24px 14px 42px; border-radius: 20px; }
    .screen { padding: 18px 14px; }
    .header { grid-template-columns: 1fr; }
    .mascot-panel { width: 76px; justify-self: center; margin-top: 3px; }
    .time-mascot { width: 58px; height: 58px; }
    .summary { gap: 5px; }
    .metric { padding: 7px 6px; }
    .metric-label { font-size: 8px; }
    .metric-value { font-size: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }
    .monitor:hover { transform: none; }
  }
</style>
</head>
<body>
<div class="monitor theme-tan" id="monitor">

  <div class="screen">

        <div class="mascot-copy">
          <span id="mascotLineA">TARGET LOCKED</span><br>

<script>
// ── CONFIG ──
const DAYS_CONFIG = [
  { name: 'MONDAY',    defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'TUESDAY',   defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'WEDNESDAY', defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'THURSDAY',  defaultIn: '08:00', defaultOut: '17:15', defaultLunch: 60, baseTarget: 8.25 },
  { name: 'FRIDAY',    defaultIn: '08:00', defaultOut: '15:30', defaultLunch: 30, baseTarget: 7.00 },
];
const LUNCH_OPTIONS  = [30, 45, 60];
const HOLIDAY_HOURS  = 8.0;
const PTO_HOURS      = 8.25;
const STORAGE_KEY    = 'timecard_v3';
const THEME_KEY      = 'timecard_theme';

// temp store for times when a day goes holiday
const savedTimes = {};

// ── BUILD DOM ──
const container = document.getElementById('rows');

DAYS_CONFIG.forEach((day, i) => {
  const btns = LUNCH_OPTIONS.map(m => {
    const label  = m === 60 ? '1H' : `${m}M`;
    const active = m === day.defaultLunch ? ' active' : '';
    return `<button class="lunch-btn${active}" data-day="${i}" data-val="${m}">${label}</button>`;
  }).join('');

  const dc = document.createElement('div');
  dc.className = 'day-card';
  dc.id = `card-${i}`;
  dc.innerHTML = `
    <div class="day-top">
      <span class="day-name">${day.name}</span>
      <div class="day-btns">
        <button class="hol-btn" data-day="${i}">[HOL]</button>
        <button class="pto-btn" data-day="${i}">[PTO]</button>
      </div>
    </div>
    <div class="holiday-display" id="hol-display-${i}">▓ HOLIDAY — 8.00H ▓</div>
    <div class="pto-display" id="pto-display-${i}">▓ PTO — ${DAYS_CONFIG[i].baseTarget.toFixed(2)}H ▓</div>
    <div class="times-row" id="times-${i}">
      <div class="time-group">
        <div class="time-label">Clock in</div>
        <input type="time" id="in-${i}" value="${day.defaultIn}">
      </div>
      <div class="time-group">
        <div class="time-label">Clock out</div>
        <input type="time" id="out-${i}" value="${day.defaultOut}">
      </div>
    </div>
    <div class="bottom-row" id="bottom-${i}">
      <div>
        <div class="lunch-label">Lunch</div>
        <div class="lunch-btns">${btns}</div>
      </div>
      <div class="hours-wrap">
        <div class="hours-label">Hours</div>
        <div id="pill-${i}" class="pill pill-none">–</div>
      </div>
    </div>
  `;
  container.appendChild(dc);
});

// ── HELPERS ──
function roundQ(min) {
  const r = min % 15;
  return r < 7.5 ? Math.floor(min / 15) * 15 : Math.ceil(min / 15) * 15;
}
function toMin(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function isHolidayDay(i) {
  return !!document.querySelector(`.hol-btn[data-day="${i}"]`)?.classList.contains('active');
}
function isPtoDay(i) {
  return !!document.querySelector(`.pto-btn[data-day="${i}"]`)?.classList.contains('active');
}
function fridayIsHoliday() { return isHolidayDay(4); }

// per-day effective target (accounts for Friday holiday ripple on Mon–Thu)
function effectiveTarget(i) {
  if (isPtoDay(i)) return DAYS_CONFIG[i].baseTarget; // PTO credits the day's normal hours (7H on Friday)
  if (isHolidayDay(i)) {
    if (i === 4) return HOLIDAY_HOURS;
    return DAYS_CONFIG[i].baseTarget;
  }
  if (i < 4 && fridayIsHoliday()) return 8.00;
  return DAYS_CONFIG[i].baseTarget;
}

// dynamic weekly target
function weeklyTarget() {
  let t = 0;
  for (let i = 0; i < 5; i++) t += effectiveTarget(i);
  return t;
}

function updateMascot(diff) {
  const panel = document.getElementById('mascotPanel');
  const lineA = document.getElementById('mascotLineA');
  const lineB = document.getElementById('mascotLineB');
  if (!panel || !lineA || !lineB) return;

  const absDiff = Math.abs(diff);
  const mins = Math.round(absDiff * 60);
  let status = 'good';
  let text = ['TARGET LOCKED', 'WEEKLY DIFF IS STABLE'];

  if (absDiff >= 3) {
    status = 'meltdown';
    text = diff < 0
      ? ['RED 3H+ SHORT', `${mins} MIN SHORT`]
      : ['RED 3H+ OVER', `${mins} MIN OVER`];
  } else if (absDiff >= 2) {
    status = 'stressed';
    text = diff < 0
      ? ['ORANGE 2H+ SHORT', `${mins} MIN SHORT`]
      : ['ORANGE 2H+ OVER', `${mins} MIN OVER`];
  } else if (absDiff >= 1) {
    status = 'worried';
    text = diff < 0
      ? ['YELLOW 1H+ SHORT', `${mins} MIN SHORT`]
      : ['YELLOW 1H+ OVER', `${mins} MIN OVER`];
  }

  panel.classList.remove(
    'mascot-status-good',
    'mascot-status-worried',
    'mascot-status-stressed',
    'mascot-status-meltdown'
  );
  panel.classList.add(`mascot-status-${status}`);
  lineA.textContent = text[0];
  lineB.textContent = text[1];
}

// ── SHARED HELPER: restore a day to normal (times visible, no holiday/pto) ──
function clearDayOverride(i) {
  if (savedTimes[i]) {
    document.getElementById(`in-${i}`).value  = savedTimes[i].inV;
    document.getElementById(`out-${i}`).value = savedTimes[i].outV;
    delete savedTimes[i];
  }
  document.getElementById(`times-${i}`).style.display       = '';
  document.getElementById(`bottom-${i}`).style.display      = '';
  document.getElementById(`hol-display-${i}`).style.display = 'none';
  document.getElementById(`pto-display-${i}`).style.display = 'none';
  document.getElementById(`card-${i}`).classList.remove('is-holiday', 'is-pto');
  document.querySelector(`.hol-btn[data-day="${i}"]`).classList.remove('active');
  document.querySelector(`.pto-btn[data-day="${i}"]`).classList.remove('active');
}

// ── HOLIDAY / PTO TOGGLE ──
container.addEventListener('click', e => {
  // holiday button
  const holBtn = e.target.closest('.hol-btn');
  if (holBtn) {
    const i = parseInt(holBtn.dataset.day, 10);
    const turningOn = !holBtn.classList.contains('active');

    if (turningOn) {
      clearDayOverride(i);   // dismiss PTO if active
      savedTimes[i] = {
        inV:  document.getElementById(`in-${i}`).value,
        outV: document.getElementById(`out-${i}`).value,
      };
      document.getElementById(`times-${i}`).style.display       = 'none';
      document.getElementById(`bottom-${i}`).style.display      = 'none';
      document.getElementById(`hol-display-${i}`).style.display = 'block';
      document.getElementById(`card-${i}`).classList.add('is-holiday');
      holBtn.classList.add('active');
    } else {
      clearDayOverride(i);
    }
    saveState(); update(); return;
  }

  // PTO button
  const ptoBtn = e.target.closest('.pto-btn');
  if (ptoBtn) {
    const i = parseInt(ptoBtn.dataset.day, 10);
    const turningOn = !ptoBtn.classList.contains('active');

    if (turningOn) {
      clearDayOverride(i);   // dismiss holiday if active
      savedTimes[i] = {
        inV:  document.getElementById(`in-${i}`).value,
        outV: document.getElementById(`out-${i}`).value,
      };
      document.getElementById(`times-${i}`).style.display       = 'none';
      document.getElementById(`bottom-${i}`).style.display      = 'none';
      document.getElementById(`pto-display-${i}`).style.display = 'block';
      document.getElementById(`card-${i}`).classList.add('is-pto');
      ptoBtn.classList.add('active');
    } else {
      clearDayOverride(i);
    }
    saveState(); update(); return;
  }

  // lunch button
  const lunchBtn = e.target.closest('.lunch-btn');
  if (lunchBtn) {
    const d = lunchBtn.dataset.day;
    document.querySelectorAll(`.lunch-btn[data-day="${d}"]`).forEach(b => b.classList.remove('active'));
    lunchBtn.classList.add('active');
    saveState(); update();
  }
});

// ── MAIN UPDATE ──
function update() {
  const wTarget = weeklyTarget();
  // show target — if it changed from base 40h, show the actual number
  const base40 = Math.abs(wTarget - 40) < 0.01;
  document.getElementById('target-display').textContent = base40 ? '40H' : wTarget.toFixed(2) + 'H';

  let total = 0;

  DAYS_CONFIG.forEach((day, i) => {
    const pill    = document.getElementById(`pill-${i}`);
    const eTarget = effectiveTarget(i);

    if (isHolidayDay(i)) {
      total += HOLIDAY_HOURS;
      pill.textContent = '8.00H';
      pill.className   = 'pill pill-hol';
      return;
    }
    if (isPtoDay(i)) {
      const ptoH = DAYS_CONFIG[i].baseTarget;
      total += ptoH;
      pill.textContent = ptoH.toFixed(2) + 'H';
      pill.className   = 'pill pill-pto';
      return;
    }

    const inV  = document.getElementById(`in-${i}`).value;
    const outV = document.getElementById(`out-${i}`).value;
    if (!inV || !outV) { pill.textContent = '–'; pill.className = 'pill pill-none'; return; }

    const activeBtn = document.querySelector(`.lunch-btn.active[data-day="${i}"]`);
    const lunch  = activeBtn ? parseInt(activeBtn.dataset.val, 10) : day.defaultLunch;
    const worked = (roundQ(toMin(outV)) - roundQ(toMin(inV)) - lunch) / 60;
    if (worked <= 0) { pill.textContent = 'ERR'; pill.className = 'pill pill-short'; return; }
    total += worked;

    pill.textContent = worked.toFixed(2) + 'H';
    const delta = worked - eTarget;
    pill.className = 'pill ' + (Math.abs(delta) < 0.01 ? 'pill-ok' : delta < 0 ? 'pill-short' : 'pill-over');
  });

  const diff   = total - wTarget;
  const diffEl = document.getElementById('diff');
  const subEl  = document.getElementById('diff-sub');
  const advEl  = document.getElementById('advice');
  document.getElementById('total').textContent = total.toFixed(2) + 'H';

  if (Math.abs(diff) < 0.01) {
    diffEl.textContent = 'ON TARGET'; diffEl.className = 'metric-value good';
    subEl.textContent  = '';
    advEl.innerHTML    = '<span class="prompt">&gt; </span><span class="advice-text good">STATUS: TARGET REACHED. NOTHING TO MAKE UP.</span>';
  } else if (diff < 0) {
    const mins = Math.round(Math.abs(diff) * 60);
    diffEl.textContent = '-' + Math.abs(diff).toFixed(2) + 'H'; diffEl.className = 'metric-value bad';
    subEl.textContent  = mins + ' MIN SHORT';
    advEl.innerHTML    = `<span class="prompt">&gt; </span><span class="advice-text warn">MAKE UP ${mins} MIN (${Math.abs(diff).toFixed(2)}H). CLOCK IN EARLIER OR STAY LATER.</span>`;
  } else {
    const mins = Math.round(diff * 60);
    diffEl.textContent = '+' + diff.toFixed(2) + 'H'; diffEl.className = 'metric-value bad';
    subEl.textContent  = mins + ' MIN OVER';
    advEl.innerHTML    = `<span class="prompt">&gt; </span><span class="advice-text warn">WARNING: ${mins} MIN OVER TARGET. LEAVE EARLY TO COMPENSATE.</span>`;
  }

  updateMascot(diff);
  updateBanner();
}

// ── HOLIDAY BANNER ──
function updateBanner() {
  const banner = document.getElementById('holiday-banner');
  const lines  = [];

  for (let i = 0; i < 4; i++) {
    if (isHolidayDay(i)) {
      if (fridayIsHoliday()) {
        lines.push(`${DAYS_CONFIG[i].name} HOLIDAY ACTIVE — TARGET ADJUSTED TO 40H.`);
      } else {
        lines.push(`${DAYS_CONFIG[i].name} HOLIDAY ACTIVE — 8.00H CREDITED. WEEK IS 0.25H SHORT. MAKE UP TIME.`);
      }
    }
    if (isPtoDay(i)) {
      lines.push(`${DAYS_CONFIG[i].name} PTO ACTIVE — 8.25H CREDITED. WEEK ON TARGET.`);
    }
  }
  if (fridayIsHoliday()) {
    lines.push('FRIDAY HOLIDAY ACTIVE — LEAVE AT 17:00 MON–THU');
  }
  if (isPtoDay(4)) {
    lines.push('FRIDAY PTO ACTIVE — 7.00H CREDITED. WEEK ON TARGET.');
  }

  if (lines.length === 0) {
    banner.innerHTML = '';
    banner.classList.remove('active');
  } else {
    banner.innerHTML = lines.map(l => `<div class="banner-line">${l}</div>`).join('');
    banner.classList.add('active');
  }
}

// ── LOCAL STORAGE ──
function saveState() {
  const state = {
    days: DAYS_CONFIG.map((_, i) => ({
      inV:      document.getElementById(`in-${i}`).value,
      outV:     document.getElementById(`out-${i}`).value,
      lunch:    parseInt(document.querySelector(`.lunch-btn.active[data-day="${i}"]`)?.dataset.val || DAYS_CONFIG[i].defaultLunch, 10),
      holiday:  isHolidayDay(i),
      pto:      isPtoDay(i),
      savedIn:  savedTimes[i]?.inV  || null,
      savedOut: savedTimes[i]?.outV || null,
    }))
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);
    state.days.forEach((d, i) => {
      document.getElementById(`in-${i}`).value  = d.inV  || DAYS_CONFIG[i].defaultIn;
      document.getElementById(`out-${i}`).value = d.outV || DAYS_CONFIG[i].defaultOut;

      document.querySelectorAll(`.lunch-btn[data-day="${i}"]`).forEach(b => b.classList.remove('active'));
      const lb = document.querySelector(`.lunch-btn[data-day="${i}"][data-val="${d.lunch}"]`);
      if (lb) lb.classList.add('active');

      if (d.holiday) {
        if (d.savedIn !== null) savedTimes[i] = { inV: d.savedIn, outV: d.savedOut };
        const hb = document.querySelector(`.hol-btn[data-day="${i}"]`);
        hb.classList.add('active');
        document.getElementById(`times-${i}`).style.display       = 'none';
        document.getElementById(`bottom-${i}`).style.display      = 'none';
        document.getElementById(`hol-display-${i}`).style.display = 'block';
        document.getElementById(`card-${i}`).classList.add('is-holiday');
      } else if (d.pto) {
        if (d.savedIn !== null) savedTimes[i] = { inV: d.savedIn, outV: d.savedOut };
        const pb = document.querySelector(`.pto-btn[data-day="${i}"]`);
        pb.classList.add('active');
        document.getElementById(`times-${i}`).style.display       = 'none';
        document.getElementById(`bottom-${i}`).style.display      = 'none';
        document.getElementById(`pto-display-${i}`).style.display = 'block';
        document.getElementById(`card-${i}`).classList.add('is-pto');
      }
    });
  } catch(e) { console.warn('State load failed', e); }
}

// ── RESET ──
let resetTimer = null;
const resetBtn    = document.getElementById('resetBtn');
const confirmBtns = document.getElementById('confirmBtns');
const confirmYes  = document.getElementById('confirmYes');
const confirmNo   = document.getElementById('confirmNo');

function cancelReset() {
  clearTimeout(resetTimer);
  resetBtn.textContent = '[ RESET WEEK ]';
  resetBtn.classList.remove('confirming');
  confirmBtns.classList.remove('visible');
}

resetBtn.addEventListener('click', () => {
  resetBtn.textContent = 'CONFIRM RESET?';
  resetBtn.classList.add('confirming');
  confirmBtns.classList.add('visible');
  resetTimer = setTimeout(cancelReset, 5000);
});
confirmNo.addEventListener('click', cancelReset);
confirmYes.addEventListener('click', () => {
  cancelReset();
  localStorage.removeItem(STORAGE_KEY);
  Object.keys(savedTimes).forEach(k => delete savedTimes[k]);

  DAYS_CONFIG.forEach((day, i) => {
    document.getElementById(`in-${i}`).value  = day.defaultIn;
    document.getElementById(`out-${i}`).value = day.defaultOut;
    document.querySelectorAll(`.lunch-btn[data-day="${i}"]`).forEach(b => b.classList.remove('active'));
    const def = document.querySelector(`.lunch-btn[data-day="${i}"][data-val="${day.defaultLunch}"]`);
    if (def) def.classList.add('active');
    document.querySelector(`.hol-btn[data-day="${i}"]`).classList.remove('active');
    document.querySelector(`.pto-btn[data-day="${i}"]`).classList.remove('active');
    document.getElementById(`times-${i}`).style.display       = '';
    document.getElementById(`bottom-${i}`).style.display      = '';
    document.getElementById(`hol-display-${i}`).style.display = 'none';
    document.getElementById(`pto-display-${i}`).style.display = 'none';
    document.getElementById(`card-${i}`).classList.remove('is-holiday', 'is-pto');
  });
  update();
});

// ── THEME TOGGLE ──
const monitor     = document.getElementById('monitor');
const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme) {
  monitor.classList.remove('theme-tan', 'theme-dark');
  monitor.classList.add(theme === 'dark' ? 'theme-dark' : 'theme-tan');
  localStorage.setItem(THEME_KEY, theme);
}

themeToggle.addEventListener('click', () => {
  applyTheme(monitor.classList.contains('theme-dark') ? 'tan' : 'dark');
});

// ── BOOT SCREEN ──
const BOOT_KEY = 'timecard_boot_date';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shouldShowBoot() { return localStorage.getItem(BOOT_KEY) !== todayStr(); }
function markBootShown()  { localStorage.setItem(BOOT_KEY, todayStr()); }

function runBootSequence(onComplete) {
  const overlay = document.getElementById('boot-overlay');
  const linesEl = document.getElementById('boot-lines');

  const lines = [
    { type: 'normal', text: 'TIMESYS BIOS v1.4 (C) 1987 .............<span class="ok">OK</span>' },
    { type: 'normal', text: 'CPU CHECK 8086 @ 4.77MHz .................<span class="ok">OK</span>' },
    { type: 'normal', text: 'MEMORY TEST 640K .........................<span class="ok">PASS</span>' },
    { type: 'normal', text: 'CLOCK SUBSYSTEM ..........................<span class="ok">OK</span>' },
    { type: 'normal', text: 'STORAGE MODULE ...........................<span class="ok">OK</span>' },
    { type: 'normal', text: 'USER DATA FOUND ..........................<span class="ok">LOADED</span>' },
    { type: 'gap' },
    { type: 'title',  text: 'TIMECARD HELPER v3.0' },
    { type: 'ready',  text: '> SYSTEM READY' },
  ];
  const timings = [80, 230, 410, 580, 750, 900, 1000, 1100, 1320];

  overlay.classList.remove('hidden');
  overlay.classList.add('powering-on');
  setTimeout(() => overlay.classList.remove('powering-on'), 260);

  lines.forEach((line, i) => {
    const el = document.createElement('div');
    if (line.type === 'gap') {
      el.style.height = '8px';
      el.className = 'boot-line visible';
    } else if (line.type === 'title') {
      el.className = 'boot-line-title';
      el.innerHTML = line.text;
    } else if (line.type === 'ready') {
      el.className = 'boot-line';
      el.innerHTML = `<span style="color:#33ff33;text-shadow:0 0 6px #33ff3366">${line.text}</span><span class="boot-cursor"></span>`;
    } else {
      el.className = 'boot-line';
      el.innerHTML = line.text;
    }
    linesEl.appendChild(el);
    if (line.type !== 'gap') {
      setTimeout(() => el.classList.add('visible'), timings[i]);
    }
  });

  // ── TRANSITION OUT ──
  setTimeout(() => {
    const screenEl  = document.querySelector('.screen');
    const contentEl = document.querySelector('.content');

    overlay.classList.add('booting-out');

    setTimeout(() => {
      overlay.classList.add('hidden');
      overlay.classList.remove('booting-out');

      screenEl.classList.add('blooming');

      // content fades in at 65% through bloom
      setTimeout(() => {
        contentEl.classList.remove('boot-hidden');
        contentEl.classList.add('boot-reveal');
      }, 585);

      // after bloom, run scanline pass
      setTimeout(() => {
        screenEl.classList.remove('blooming');
        contentEl.classList.remove('boot-reveal');

        const scanline = document.getElementById('boot-scanline');
        const screenH  = screenEl.offsetHeight;
        const duration = 1100;
        let startTime  = null;
        let rafHandle  = null;

        scanline.classList.add('sweeping');

        function animateScan(ts) {
          if (!startTime) startTime = ts;
          const elapsed  = ts - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased    = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;

          scanline.style.top = (eased * (screenH + 32) - 32) + 'px';

          const distort = Math.sin(elapsed / 60) * 0.5 * Math.max(0, 1 - progress * 1.4);
          contentEl.style.transform = `skewX(${distort}deg)`;

          if (progress < 1) {
            rafHandle = requestAnimationFrame(animateScan);
          } else {
            rafHandle = null;
            scanline.classList.remove('sweeping');
            scanline.style.top = '';
            contentEl.style.transform = '';
            onComplete();
          }
        }
        rafHandle = requestAnimationFrame(animateScan);

      }, 910);

    }, 290);
  }, 1750);
}

// ── INIT ──
applyTheme(localStorage.getItem(THEME_KEY) || 'tan');
loadState();
document.querySelectorAll('input[type=time]').forEach(el =>
  el.addEventListener('change', () => { saveState(); update(); })
);
update();

if (shouldShowBoot()) {
  markBootShown();
  document.querySelector('.content').classList.add('boot-hidden');
  runBootSequence(() => {});
}

</script>
